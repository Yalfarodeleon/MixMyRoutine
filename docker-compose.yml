# =============================================================================
# DOCKER COMPOSE
# =============================================================================
#
# ONE COMMAND TO RULE THEM ALL:
#   docker-compose up --build
#
# This starts PostgreSQL, backend, and frontend — all connected together.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # POSTGRESQL DATABASE
  # ---------------------------------------------------------------------------
  # PostgreSQL is a production-grade relational database.
  # This runs it in a Docker container so you don't need to install it locally.
  db:
    image: postgres:16-alpine  # Alpine = smaller image size
    container_name: mixmyroutine-db
    restart: unless-stopped
    
    # Environment variables configure the database
    environment:
      POSTGRES_USER: mixmyroutine
      POSTGRES_PASSWORD: mixmyroutine_secret
      POSTGRES_DB: mixmyroutine
    
    # Expose PostgreSQL port to host for debugging tools like pgAdmin
    ports:
      - "5432:5432"
    
    # VOLUMES: Persist data even if the container is destroyed
    # Without this, you'd lose all data every time you run docker-compose down
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    # Health check - ensures PostgreSQL is ready before backend connects
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mixmyroutine"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # BACKEND SERVICE
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    
    container_name: mixmyroutine-backend
    restart: unless-stopped
    
    ports:
      - "8000:8000"
    
    # DATABASE_URL uses "db" as host because that's the service name above.
    # Docker's internal DNS resolves "db" to the PostgreSQL container's IP.
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://mixmyroutine:mixmyroutine_secret@db:5432/mixmyroutine
      - SECRET_KEY=change-this-to-a-real-secret-in-production
    
    # Wait for PostgreSQL to be healthy before starting
    depends_on:
      db:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # FRONTEND SERVICE
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    
    container_name: mixmyroutine-frontend
    restart: unless-stopped
    
    ports:
      - "3000:80"
    
    depends_on:
      backend:
        condition: service_started
    
    environment:
      - NODE_ENV=production

# =============================================================================
# VOLUMES
# =============================================================================
# Named volumes persist data between container restarts.
volumes:
  postgres_data: